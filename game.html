<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>오늘 뭐 먹지? - 게임</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/game-style.css" />
    <link rel="stylesheet" href="css/game-tournament.css" />
    <link rel="stylesheet" href="css/game-roulette.css" />
  </head>
  <body>
    <header>
      <div id="header">
        <div id="title">오늘 뭐 먹지?</div>
        <div id="nav">
          <div data-game="roulette">룰렛 게임</div>
          <div data-game="tournament">토너먼트 게임</div>
          <div data-game="guess">음식 맞추기 게임</div>
          <div data-game="team">팀 소개</div>
        </div>
      </div>
    </header>

    <main>
      <section id="roulette-game" class="game-panel">
        <div class="game-content">
          <h2 class="roulette-heading">🎰 룰렛 게임</h2>
          <p class="roulette-desc">룰렛을 돌려 오늘의 메뉴를 정해 보세요!</p>

          <div class="roulette-board">
            <div class="roulette-pointer" aria-hidden="true"></div>
            <div id="roulette-wheel" class="roulette-wheel"></div>
            <div class="roulette-center-cap" aria-hidden="true">🍽️</div>
          </div>

          <p id="roulette-result" class="roulette-result">
            버튼을 눌러 룰렛을 돌려보세요
          </p>
          <button
            type="button"
            id="roulette-spin-btn"
            class="roulette-spin-btn"
          >
            룰렛 돌리기
          </button>
          <a id="roulette-form-link" class="roulette-form-link hidden" href="#"
            >레시피 추천 받기</a
          >
        </div>
      </section>

      <section id="tournament-game" class="game-panel">
        <div class="game-content">
          <h2 class="title" id="tournament-title">음식 토너먼트</h2>
          <p class="round-info" id="round-info">1/4</p>

          <div class="match-container">
            <div class="food-card" id="left-card">
              <div class="image-placeholder" id="left-img"></div>
              <div class="food-name" id="left-name">음식 1</div>
            </div>

            <div class="vs-text">VS</div>

            <div class="food-card" id="right-card">
              <div class="image-placeholder" id="right-img"></div>
              <div class="food-name" id="right-name">음식 2</div>
            </div>
          </div>
        </div>
      </section>

      <section id="guess-game" class="game-panel">
        <section class="game-content" id="game-main">
          <div class="game-title">음식 맞추기</div>
          <div class="game-grid-container">
            <div class="game-grid-element"></div>
            <div class="game-grid-element"></div>
            <div class="game-grid-element"></div>
            <div class="game-grid-element"></div>

            <div class="game-grid-element"></div>
            <div class="game-grid-element"></div>
            <div class="game-grid-element"></div>
            <div class="game-grid-element"></div>

            <div class="game-grid-element"></div>
            <div class="game-grid-element"></div>
            <div class="game-grid-element"></div>
            <div class="game-grid-element"></div>
          </div>
          <ol class="game-select">
            <li class="game-select-opt">PlaceHolder</li>
            <li class="game-select-opt">PlaceHolder</li>
            <li class="game-select-opt">PlaceHolder</li>
            <li class="game-select-opt">PlaceHolder</li>
          </ol>
        </section>

        <section class="game-content hidden" id="game-end">
          <div class="game-title">정답 공개</div>
          <div>
            <img
              class="game-food-image"
              src="./assets/image/game/placeholder.png"
              alt="food_image"
            />
          </div>
          <div class="game-result">
            <span class="game-result-succ">(성공! or 실패!)</span>
            <span> </span> <span class="game-result-menu">메뉴명</span>
          </div>
          <button class="recipe-redirect-btn">레시피 보러가기</button>
        </section>
      </section>
    </main>

    <div class="modal-overlay" id="winner-modal">
      <div class="modal-content">
        <h2 class="modal-title">축하합니다! 🏆</h2>
        <p class="modal-sub">오늘의 우승 메뉴</p>

        <div class="winner-display">
          <div class="image-placeholder" id="winner-img"></div>
          <div class="food-name" id="winner-name">우승 음식</div>
        </div>

        <a href="#" class="shortcut-btn" id="shortcut-link">레시피 가기</a>
      </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/game-nav.js"></script>
    <script src="js/tournament-game.js"></script>
    <script src="js/roulette-game.js"></script>
    <script src="js/game.js"></script>
  </body>
</html>
